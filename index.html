<!DOCTYPE html>
<html>
<head>
  <title>Smart Pole Map - Real Time + History</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { margin:0; font-family:Arial; }
    #map { height:100vh; }
    #info {
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      background:white;
      padding:10px 20px;
      border-radius:5px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      z-index:1000;
    }
    canvas {
      width: 250px !important;
      height: 150px !important;
    }
  </style>
</head>
<body>
  <div id="info">Smart Pole Status Map</div>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    // --- Initialize map ---
    var map = L.map('map').setView([19.07, 72.87], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // --- Custom pole icon ---
    function createPoleIcon(color) {
      return L.divIcon({
        html: `
          <div style="
            width:20px; 
            height:40px; 
            background:${color}; 
            border-radius:4px; 
            position:relative;">
            <div style="
              width:0; 
              height:0; 
              border-left:10px solid transparent;
              border-right:10px solid transparent;
              border-bottom:10px solid ${color};
              position:absolute; 
              top:-10px; 
              left:0;"></div>
          </div>
        `,
        className: '',
        iconSize: [20,50],
        iconAnchor: [10,50],
        popupAnchor: [0,-50]
      });
    }

    // --- Initialize poles ---
    var poles = [
      { name: 'Pole 1', lat: 19.072, lon: 72.882, status: 'gray', field: 'field1' },
      { name: 'Pole 2', lat: 19.068, lon: 72.885, status: 'gray', field: 'field2' },
      { name: 'Pole 3', lat: 19.070, lon: 72.890, status: 'gray', field: 'field3' }
    ];

    var poleMarkers = [];
    const apiKey = "50TS40IY7R5RVBKP"; // Your ThingSpeak API key

    // --- Add poles to map ---
    poles.forEach((pole, index) => {
      var marker = L.marker([pole.lat, pole.lon], {icon: createPoleIcon(pole.status)})
        .bindPopup(`<b>${pole.name}</b><br>Status: ${pole.status}<br>Loading chart...`)
        .addTo(map);

      // On popup open, fetch historical data and display chart
      marker.on('popupopen', () => {
        fetchHistoricalData(pole.field, marker);
      });

      poleMarkers.push(marker);
    });

    // --- Fetch latest status ---
    async function fetchPoleStatus() {
      try {
        const response = await fetch(`https://api.thingspeak.com/channels/3311507/feeds.json?api_key=${apiKey}&results=1`);
        const data = await response.json();
        const feed = data.feeds[0];

        poles.forEach((pole, index) => {
          let statusValue = feed[pole.field]; // 0,1,2
          let color = 'gray';
          if(statusValue == '1') color = 'green';
          else if(statusValue == '2') color = 'red';

          pole.status = color;
          poleMarkers[index].setIcon(createPoleIcon(color));
          poleMarkers[index].setPopupContent(`<b>${pole.name}</b><br>Status: ${color}<br>Click for history`);
        });
      } catch (err) {
        console.error("Error fetching ThingSpeak data:", err);
      }
    }

    setInterval(fetchPoleStatus, 10000); // update every 10s
    fetchPoleStatus(); // initial fetch

    // --- Fetch historical data for a pole ---
    async function fetchHistoricalData(field, marker) {
      try {
        const response = await fetch(`https://api.thingspeak.com/channels/3311507/fields/${field.slice(-1)}.json?api_key=${apiKey}&results=20`);
        const data = await response.json();
        const feeds = data.feeds;

        const labels = feeds.map(f => f.created_at.slice(11,19)); // show HH:MM:SS
        const values = feeds.map(f => parseInt(f[`field${field.slice(-1)}`]));

        const popupContent = `<b>${marker.getPopup().getContent().split('<br>')[0]}</b><br>
                              <canvas id="chart${field}" width="250" height="150"></canvas>`;

        marker.setPopupContent(popupContent);

        // Delay to allow canvas element to render
        setTimeout(() => {
          const ctx = document.getElementById(`chart${field}`).getContext('2d');
          new Chart(ctx, {
            type: 'line',
            data: {
              labels: labels,
              datasets: [{
                label: 'Status (0=Gray,1=Green,2=Red)',
                data: values,
                borderColor: 'blue',
                backgroundColor: 'rgba(0,0,255,0.1)',
                tension:0.2,
                fill:true
              }]
            },
            options: {
              responsive:false,
              plugins: {
                legend: { display: false }
              },
              scales: {
                y: { min:0, max:2, ticks:{stepSize:1} }
              }
            }
          });
        }, 100);

      } catch (err) {
        console.error("Error fetching historical data:", err);
      }
    }

  </script>
</body>
</html>
